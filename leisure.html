    <meta property="og:type" content="website" />

      property="og:description"
      content="Five endless browser sketches for polymerization, catalytic transport, charge hopping, vitrimer healing, and wormlike chain motion."
    />

    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const key = 'haoyu-theme-mode';
        let mode = 'auto';
        try {
          mode = localStorage.getItem(key) || 'auto';
        } catch {}
        const hour = new Date().getHours();
        const effective = mode === 'auto' ? (hour >= 7 && hour < 18 ? 'light' : 'dark') : mode;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body class="leisure-page">
    <div class="site-shell leisure-shell">
      <div class="topbar-wrap">
        <header class="container topbar">
          <a class="brand" href="index.html" aria-label="Haoyu Wu home page">
            <span class="brand-mark" aria-hidden="true">HW</span>
            <span class="brand-copy">
              <span class="brand-title">Haoyu Wu</span>
              <span class="brand-subtitle">Molecular simulation · polymer physics · scientific software</span>
            </span>
          </a>
          <nav class="nav-links" aria-label="Primary navigation">
            <a class="nav-link" data-nav="home" href="index.html">Overview</a>
            <a class="nav-link" data-nav="publications" href="publications.html">Publications</a>
            <a class="nav-link" data-nav="wiki" href="wiki.html">Research Wiki</a>
            <a class="nav-link" data-nav="leisure" href="leisure.html">Rest Mode</a>
            <button id="theme-toggle" class="nav-link theme-toggle" type="button" aria-label="Switch theme">
              <span data-theme-icon aria-hidden="true">◐</span>
              <span data-theme-label>Auto</span>
            </button>
          </nav>
        </header>
      </div>

      <main class="site-main leisure-main">
        <section class="leisure-stage" aria-label="Interactive browser game">
          <canvas id="playground" class="playground-canvas-full" aria-label="Playable chemistry-inspired browser game"></canvas>

          <div class="leisure-hud leisure-hud-primary glass-card">
            <span id="mode-subtitle" class="kicker">Rest mode</span>
            <h1 id="mode-title" class="mode-title">Interactive mode</h1>
            <p id="mode-description" class="hud-copy"></p>
          </div>

          <div class="leisure-hud leisure-hud-metrics glass-card" aria-live="polite">
            <div class="hud-chip"><span>Score</span><strong id="hud-score">0</strong></div>
            <div class="hud-chip"><span>Best</span><strong id="hud-best">0</strong></div>
          </div>

          <div class="leisure-hud leisure-hud-controls glass-card">
            <label class="sr-only" for="mode-selector">Choose a mode</label>
            <select id="mode-selector"></select>
            <button id="mode-reroll" class="btn secondary inline-btn" type="button">Random</button>
          </div>

          <div class="leisure-hud leisure-hud-note glass-card">
            <p id="mode-instruction" class="hud-copy"></p>
            <p id="mode-concept" class="hud-note"></p>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/js/theme.js"></script>
    <script type="module" src="assets/js/leisure.js"></script>
  </body>
</html>
