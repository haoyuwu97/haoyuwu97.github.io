<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Research program map</title>
  <desc id="desc">A restrained schematic linking molecular trajectories to descriptors, mechanisms, and macroscopic observables.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#efe7d4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2a35"/>
      <stop offset="1" stop-color="#485463"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17202a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b6f3d"/>
    </marker>
  </defs>
  <rect width="960" height="560" rx="34" fill="url(#paper)"/>
  <g opacity="0.18" stroke="#8b6f3d" stroke-width="1">
    <path d="M80 100 C180 60 270 125 360 86 S560 72 650 116 S770 188 875 124" fill="none"/>
    <path d="M80 458 C186 386 280 485 385 428 S575 382 685 438 S780 514 882 454" fill="none"/>
  </g>
  <g fill="#8b6f3d" opacity="0.35">
    <circle cx="119" cy="88" r="5"/><circle cx="157" cy="112" r="3"/><circle cx="209" cy="76" r="4"/>
    <circle cx="727" cy="143" r="4"/><circle cx="806" cy="110" r="5"/><circle cx="851" cy="138" r="3"/>
    <circle cx="181" cy="449" r="4"/><circle cx="286" cy="468" r="3"/><circle cx="754" cy="447" r="5"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="140" width="210" height="128" rx="18" fill="#fffaf0" stroke="#d2c2a4"/>
    <rect x="370" y="70" width="220" height="128" rx="18" fill="#fffaf0" stroke="#d2c2a4"/>
    <rect x="666" y="140" width="220" height="128" rx="18" fill="#fffaf0" stroke="#d2c2a4"/>
    <rect x="214" y="354" width="220" height="128" rx="18" fill="#fffaf0" stroke="#d2c2a4"/>
    <rect x="548" y="354" width="220" height="128" rx="18" fill="#fffaf0" stroke="#d2c2a4"/>
  </g>
  <g font-family="Times New Roman, Times, serif" fill="#17202a">
    <text x="102" y="178" font-size="25" font-weight="700">Trajectories</text>
    <text x="102" y="211" font-size="16" fill="#5e6875">CG / atomistic MD</text>
    <text x="102" y="236" font-size="16" fill="#5e6875">polymer motion, stress, ions</text>
    <text x="401" y="108" font-size="25" font-weight="700">Descriptors</text>
    <text x="401" y="141" font-size="16" fill="#5e6875">topology, connectivity</text>
    <text x="401" y="166" font-size="16" fill="#5e6875">transport kernels</text>
    <text x="697" y="178" font-size="25" font-weight="700">Mechanisms</text>
    <text x="697" y="211" font-size="16" fill="#5e6875">fracture, exchange</text>
    <text x="697" y="236" font-size="16" fill="#5e6875">hysteresis, percolation</text>
    <text x="245" y="392" font-size="25" font-weight="700">Closure</text>
    <text x="245" y="425" font-size="16" fill="#5e6875">statistical mechanics</text>
    <text x="245" y="450" font-size="16" fill="#5e6875">continuum linkage</text>
    <text x="579" y="392" font-size="25" font-weight="700">Observables</text>
    <text x="579" y="425" font-size="16" fill="#5e6875">modulus, conductivity</text>
    <text x="579" y="450" font-size="16" fill="#5e6875">device response</text>
  </g>
  <g fill="none" stroke="#8b6f3d" stroke-width="3" marker-end="url(#arrow)">
    <path d="M283 183 C325 154 340 132 370 124"/>
    <path d="M590 124 C626 134 641 159 666 183"/>
    <path d="M752 268 C724 320 671 340 648 354"/>
    <path d="M548 418 C504 418 472 418 434 418"/>
    <path d="M290 354 C256 318 228 286 198 268"/>
  </g>
  <g transform="translate(455 252)">
    <circle r="70" fill="#17202a" opacity="0.08"/>
    <circle r="45" fill="none" stroke="#8b6f3d" stroke-width="2" stroke-dasharray="6 7"/>
    <circle cx="-18" cy="-8" r="8" fill="#8b6f3d" opacity="0.72"/>
    <circle cx="17" cy="13" r="7" fill="#354252" opacity="0.78"/>
    <circle cx="10" cy="-24" r="5" fill="#8b6f3d" opacity="0.62"/>
    <circle cx="-8" cy="25" r="5" fill="#354252" opacity="0.65"/>
    <path d="M-18 -8 L10 -24 L17 13 L-8 25 Z" fill="none" stroke="#8b6f3d" stroke-width="1.6" opacity="0.65"/>
  </g>
</svg>
