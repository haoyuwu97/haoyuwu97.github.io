<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Scientific computing workflow for molecular simulation</title>
  <desc id="desc">A TOC-style schematic of a trajectory-to-descriptor-to-kernel-to-model workflow with provenance and validation.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#eef3f9"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#172033"/><stop offset="1" stop-color="#0d4658"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#122239" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#0e6b83"/></marker>
    <style>
      .bg{fill:url(#paper)}.panel{fill:#fff;stroke:#d9d3c4;stroke-width:1.25}.label{font:700 18px Georgia,'Times New Roman',serif;fill:#172033}.small{font:13px Georgia,'Times New Roman',serif;fill:#56616e}.micro{font:12px Georgia,'Times New Roman',serif;fill:#677282}.box{fill:#fffaf4;stroke:#d8c89f;stroke-width:1.3}.boxB{fill:#f7fbff;stroke:#cbd8e6;stroke-width:1.3}.arrow{fill:none;stroke:#0e6b83;stroke-width:2.8;marker-end:url(#arrow)}.code{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#d8f6f6}.dim{fill:#8db3c9}.node{fill:#0e6b83}.gold{fill:#c58b32}.line{stroke:#2f3a48;stroke-width:1.3}.spark{stroke:#c58b32;stroke-width:2.6;fill:none;stroke-linecap:round}
    </style>
  </defs>
  <rect class="bg" width="960" height="540" rx="28"/>
  <g filter="url(#shadow)">
    <rect class="panel" x="42" y="42" width="876" height="456" rx="22"/>
  </g>
  <text class="label" x="76" y="84">simulation-to-model software workflow</text>
  <text class="small" x="76" y="109">portable analysis objects instead of one-off scripts</text>

  <g transform="translate(76 145)">
    <rect class="boxB" x="0" y="0" width="156" height="132" rx="16"/>
    <text class="micro" x="18" y="26">trajectory</text>
    <g transform="translate(22 45)">
      <rect x="0" y="0" width="42" height="42" rx="8" fill="#eef6ff" stroke="#bcd0df"/><rect x="34" y="16" width="42" height="42" rx="8" fill="#fffaf0" stroke="#dbc99e"/><rect x="68" y="32" width="42" height="42" rx="8" fill="#eef9f6" stroke="#bddbd6"/>
      <circle class="node" cx="16" cy="18" r="4"/><circle class="gold" cx="52" cy="34" r="4"/><circle class="node" cx="88" cy="54" r="4"/>
      <path d="M16 18 C34 32 52 34 88 54" stroke="#0e6b83" stroke-width="2" fill="none"/>
    </g>
    <text class="small" x="18" y="109">frames + topology</text>
  </g>

  <path class="arrow" d="M246 210 C280 210 302 210 326 210"/>

  <g transform="translate(336 145)">
    <rect class="box" x="0" y="0" width="176" height="132" rx="16"/>
    <text class="micro" x="18" y="26">descriptor registry</text>
    <g transform="translate(22 48)">
      <rect x="0" y="0" width="22" height="70" rx="4" fill="#0e6b83" opacity=".82"/><rect x="36" y="20" width="22" height="50" rx="4" fill="#c58b32" opacity=".86"/><rect x="72" y="10" width="22" height="60" rx="4" fill="#6b8fb0" opacity=".8"/><rect x="108" y="32" width="22" height="38" rx="4" fill="#0e6b83" opacity=".6"/>
      <line class="line" x1="0" y1="78" x2="136" y2="78"/>
    </g>
    <text class="small" x="18" y="109">observable objects</text>
  </g>

  <path class="arrow" d="M526 210 C560 210 584 210 608 210"/>

  <g transform="translate(618 145)">
    <rect class="boxB" x="0" y="0" width="190" height="132" rx="16"/>
    <text class="micro" x="18" y="26">kernel extraction</text>
    <path class="spark" d="M24 88 C50 26 76 105 104 56 S150 43 170 84"/>
    <circle class="node" cx="24" cy="88" r="4"/><circle class="gold" cx="104" cy="56" r="4"/><circle class="node" cx="170" cy="84" r="4"/>
    <text class="small" x="18" y="109">transport / rheology</text>
  </g>

  <path class="arrow" d="M706 286 C690 335 639 362 586 370"/>
  <path class="arrow" d="M336 286 C355 336 415 363 470 371"/>

  <g transform="translate(424 336)">
    <rect x="0" y="0" width="228" height="108" rx="17" fill="url(#screen)" stroke="#0d2e44"/>
    <text class="code" x="20" y="32">$ pilots analyze trajectory</text>
    <text class="code" x="20" y="55">&gt; descriptor: graph_path</text>
    <text class="code" x="20" y="78">&gt; kernel: mobility(t,state)</text>
    <circle cx="202" cy="26" r="5" fill="#8edbe0"/><circle cx="202" cy="47" r="5" fill="#c58b32"/><circle cx="202" cy="68" r="5" fill="#8edbe0"/>
  </g>

  <g transform="translate(76 348)">
    <rect class="boxB" x="0" y="0" width="214" height="86" rx="16"/>
    <text class="micro" x="18" y="26">validation layer</text>
    <text class="label" x="18" y="51" font-size="15">units · uncertainty · provenance</text>
    <text class="small" x="18" y="70">auditable simulation outputs</text>
  </g>

  <g transform="translate(724 336)">
    <rect class="box" x="0" y="0" width="170" height="108" rx="17"/>
    <text class="micro" x="18" y="27">model interface</text>
    <line class="line" x1="26" y1="75" x2="142" y2="75"/>
    <line class="line" x1="26" y1="75" x2="26" y2="40"/>
    <path d="M30 70 C54 42 85 44 110 58 C126 67 134 62 144 49" fill="none" stroke="#0e6b83" stroke-width="3"/>
    <text class="small" x="18" y="94">continuum closure</text>
  </g>
</svg>
