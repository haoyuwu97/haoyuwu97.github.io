<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Wiki | Haoyu Wu</title>
    <meta name="description" content="A code atlas for Haoyu Wu's simulation and analysis stack." />
    <meta name="theme-color" content="#050816" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Research Wiki | Haoyu Wu" />
    <meta property="og:description" content="A code atlas for Haoyu Wu's simulation and analysis stack." />
    <meta property="og:image" content="https://haoyuwu97.github.io/assets/img/og-cover.png" />
    <meta property="og:url" content="https://haoyuwu97.github.io/wiki.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Research Wiki | Haoyu Wu" />
    <meta name="twitter:description" content="A code atlas for Haoyu Wu's simulation and analysis stack." />
    <meta name="twitter:image" content="https://haoyuwu97.github.io/assets/img/og-cover.png" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <script>
      (() => {
        const key = 'haoyu-theme-mode';
        let mode = 'auto';
        try {
          mode = localStorage.getItem(key) || 'auto';
        } catch {}
        const hour = new Date().getHours();
        const effective = mode === 'auto' ? (hour >= 7 && hour < 18 ? 'light' : 'dark') : mode;
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = effective;
        document.documentElement.style.colorScheme = effective;
      })();
    </script>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body class="subpage subpage-wiki">
    <canvas id="bg-canvas" class="bg-canvas" aria-hidden="true"></canvas>
    <div class="site-shell">
      <div class="topbar-wrap">
        <header class="container topbar">
          <a class="brand" href="index.html" aria-label="Haoyu Wu home page">
            <span class="brand-mark" aria-hidden="true">HW</span>
            <span class="brand-copy">
              <span class="brand-title">Haoyu Wu</span>
              <span class="brand-subtitle">Molecular simulation · polymer physics · scientific software</span>
            </span>
          </a>
          <nav class="nav-links" aria-label="Primary navigation">
            <a class="nav-link" data-nav="home" href="index.html">Overview</a>
            <a class="nav-link" data-nav="publications" href="publications.html">Publications</a>
            <a class="nav-link" data-nav="wiki" href="wiki.html">Research Wiki</a>
            <a class="nav-link" data-nav="leisure" href="leisure.html">Rest Mode</a>
            <button id="theme-toggle" class="nav-link theme-toggle" type="button" aria-label="Switch theme">
              <span data-theme-icon aria-hidden="true">◐</span>
              <span data-theme-label>Auto</span>
            </button>
          </nav>
        </header>
      </div>

      <main class="site-main">
        <section class="page-hero page-hero-compact">
          <div class="container">
            <div class="page-hero-shell compact-shell">
              <div class="page-head compact-page-head">
                <span class="kicker">Research Wiki</span>
                <h1 class="page-title">Package atlas</h1>
                <p class="page-subtitle compact-page-subtitle">A compact index of packages, logos, and per-project pages.</p>
                <div class="compact-meta-row" aria-label="Repository summary">
                  <span class="meta-chip"><strong id="repo-total">0</strong> packages</span>
                  <span class="meta-chip"><strong id="category-total">0</strong> categories</span>
                  <span class="meta-chip"><strong id="repo-results">0</strong> shown</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section section-tight">
          <div class="container">
            <div class="glass-card control-panel compact-control-panel" data-reveal>
              <div class="control-grid compact-control-grid compact-control-grid-single">
                <div class="control">
                  <label for="repo-search">Search</label>
                  <input id="repo-search" class="text-input" type="search" placeholder="Try: continuum, crystallization, LAMMPS, Monte Carlo..." />
                </div>
              </div>
              <div class="control">
                <label>Category</label>
                <div id="category-filters" class="chip-wrap" aria-label="Repository categories"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="section section-tight-bottom">
          <div class="container">
            <div id="repo-list" class="repo-grid"></div>
            <div id="repo-pagination" class="pagination" aria-label="Repository pagination"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="assets/js/theme.js"></script>
    <script type="module" src="assets/js/wiki.js"></script>
  </body>
</html>
